<!DOCTYPE html>
{% load static %}
{% load lunar_somnio_template_tags %}

<html lang="en">

<head>
    <meta charset="UTF-8">
    <link href="https://getbootstrap.com/docs/4.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS" crossorigin="anonymous">
    <link href={% static 'CSS/style.css' %} rel='stylesheet'>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Zalando+Sans+SemiExpanded:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">

    <title>{% block title_block %}{% endblock %}</title>
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary" style="background-image: url('{% static 'images/BG4.png' %}')">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'lunar_somnio:login' %}"> <img class="logo" src="{% static 'images/Logo3.png' %}"
                    alt="Lunar Somnio Logo" /> </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ml-auto">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="{% url 'lunar_somnio:login' %}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'lunar_somnio:dream-analyzer' 1 %}">Dream Analyzer</a>
          <!-- <a class="nav-link" href="#">Dream Analyzer</a> -->
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'lunar_somnio:profile' %}"><img class="profilepic" src='{{ request.user.userprofile.profile_pic }}'></a>
        </li>
      </ul>
    </div>
  </div>
</nav>

    <div class="container mt-4">
    {% block body_block %}{% endblock %}
    </div>

</body>
</html>
