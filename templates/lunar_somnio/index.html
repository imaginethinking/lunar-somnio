{% extends 'lunar_somnio/base.html' %}
{% load static %}

{% block title_block %}
    Home
{% endblock %}

{% block body_block %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <div class="full-page">
        <div class="box">
            <h1>
                what did you <i>dream</i> today?
            </h1>
        </div>
        <div class="box w-50 mx-auto dream-bg" style="--bg-image: url('{% static "images/BG4.png" %}')">
            <form method="POST">
                {% csrf_token %}

                <div class="input-group">
                    {{ form.title }}
                    <div class="input-group-append">
                        <button class="btn bg-light rounded-right-only" type="submit">
                            <i class="bi bi-moon-stars"></i>
                        </button>
                    </div>
                </div>

            </form>
        </div>
    </div>
{% endblock %}
