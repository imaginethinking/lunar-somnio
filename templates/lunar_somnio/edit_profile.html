{% extends 'lunar_somnio/base.html' %}
{% load staticfiles %}

{% block title_block %}
    Edit Profile
{% endblock %}

{% block body_block %}

<div class="row g-2 p-5">

    <!-- Left Column -->
    <div class="col-6">

        <!-- Title -->
        <div class="box dream-bg mb-3" style="--bg-image: url('{% static "images/BG50.png" %}');">
            <p class="da-maintitle mb-0 text-center" style="color: white"><i>Edit your profile</i></p>
        </div>

        <form method="POST">
            {% csrf_token %}

            <!-- Edit First Name & Last Name -->
            <div class="row m-0 mb-3">
                <div class="box d-flex dream-bg col-12" style="--bg-image: url('{% static "images/BG25.png" %}')">

                    <div class="card col py-2">
                        <p class="profile-subtitles text-center mb-1">First Name</p>
                        <input type="text" name="first_name" value="{{ user_profile.first_name }}" class="form-control">
                    </div>

                    <div class="card col py-2">
                        <p class="profile-subtitles text-center mb-1">Last Name</p>
                        <input type="text" name="last_name" value="{{ user_profile.last_name }}" class="form-control">
                    </div>

                </div>
            </div>

            <!-- Edit Country, Gender, Age Row -->
            <div class="row m-0 mb-3">
                <div class="box d-flex dream-bg col-12" style="--bg-image: url('{% static "images/BG25.png" %}')">

                    <div class="card col py-2">
                        <p class="profile-subtitles text-center mb-1">Country</p>
                        <input type="text" name="country" value="{{ user_profile.country }}" class="form-control">
                    </div>

                    <div class="card col py-2">
                        <p class="profile-subtitles text-center mb-1">Gender</p>
                        <input type="text" name="gender" value="{{ user_profile.gender }}" class="form-control">
                    </div>

                    <div class="card col py-2">
                        <p class="profile-subtitles text-center mb-1">Age</p>
                        <input type="number" name="age" value="{{ user_profile.age }}" class="form-control">
                    </div>

                </div>
            </div>
    </div>

    <!-- Right Column -->
    <div class="col-6">

        <!-- Edit Bio -->
        <div class="box dream-bg mb-3" style="--bg-image: url('{% static "images/BG25.png" %}')">
            <div class="card py-2 px-2">
                <p class="profile-subtitles mb-1">Bio</p>
                <textarea name="bio" class="form-control" rows="3">{{ user_profile.bio }}</textarea>
            </div>
        </div>

        <!-- Change Profile Pic URL -->
        <div class="box dream-bg mb-3" style="--bg-image: url('{% static "images/BG25.png" %}')">
            <div class="card py-2 px-2">
                 <p class="profile-subtitles mb-1">Profile Picture URL</p>
                <input type="url" name="profile_pic" value="{{ user_profile.profile_pic }}" class="form-control">
            </div>
        </div>
    </div>

    <!-- Cancel / Save Buttons -->
    <div class="d-flex justify-content-between">
        <div class="pop mr-3">
        <a href="{% url 'lunar_somnio:profile' %}" class="btn button1 dream-bg" style="--bg-image: url('{% static "images/BG50.png" %}')">Cancel</a>
        </div>
        <div class="pop">
            <button type="submit" class="btn button1 dream-bg" style="--bg-image: url('{% static "images/BG50.png" %}')">Save Changes</button>
        </div>
    </div>

    </form>

</div>

{% endblock %}
