{% extends 'lunar_somnio/base.html' %}
{% load static %}

{% block title_block %}Login{% endblock %}

{% block body_block %}
<div class="full-page">
    <div class="box text-center mb-4">
        <img src="{% static 'images/Logo3.png' %}" alt="Lunar Somnio" style="max-width: 200px;">
        <h2 class="mt-3 zalando-sans-semiexpanded">Login to your dreams</h2>
    </div>
    
    <div class="box p-5 shadow-sm dream-bg" style="--bg-image: url('{% static 'images/BG4.png' %}'); border-radius: 16px; min-width: 350px;">
        <div class="card p-4" style="background: rgba(255, 255, 255, 0.9); border-radius: 15px;">
            <form method="POST">
                {% csrf_token %}
                <input type="text" name="username" class="form-control dream-title-input mb-3" placeholder="Username" required>
                <input type="password" name="password" class="form-control dream-title-input mb-2" placeholder="Password" required>
                
                <div class="text-right mb-3">
                    <a href="#" class="small text-muted">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn btn-dark btn-block dream-title-input" style="height: auto;">Log In</button>
            </form>
            
            <p class="small text-center mt-4 mb-0">
                Don't have an account? <a href="{% url 'lunar_somnio:register' %}" class="font-weight-bold text-dark">Sign up.</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
