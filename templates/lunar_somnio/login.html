{% extends 'lunar_somnio/base.html' %}

{% block title_block %}Login{% endblock %}

{% block body_block %}
<style>
    .login-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 80vh;
        font-family: Arial, sans-serif;
        background-color: #f5f5f5; /* 浅灰色背景，防止看不见 */
    }
    .login-container {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        text-align: center;
        width: 350px;
    }
    .login-container input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 8px;
        box-sizing: border-box; /* 确保 padding 不撑开宽度 */
    }
    .login-container button {
        width: 100%;
        padding: 12px;
        background-color: #333;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 10px;
    }
</style>

<div class="login-wrapper">
    <h1>PRIMARY LOGO</h1>
    <p>Descriptive text about the website, encouraging you to join.</p>
    
    <div class="login-container">
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Email or Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <div style="text-align: right; font-size: 12px; margin-bottom: 10px;">
                <a href="#">Forgot password?</a>
            </div>
            <button type="submit">Log In Button</button>
        </form>
        <p style="font-size: 12px; margin-top: 20px;">
            Don't have an account? <a href="{% url 'lunar_somnio:register' %}">Sign up.</a>
        </p>
    </div>
</div>
{% endblock %}
