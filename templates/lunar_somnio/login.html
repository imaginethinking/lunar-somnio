{% extends 'lunar_somnio/base.html' %}
{% load static %}

{% block title_block %}Login{% endblock %}

{% block body_block %}
<div class="full-page">
    <div class="text-center mb-4">
        <img src="{% static 'images/Logo3.png' %}" alt="Lunar Somnio" style="max-width: 180px; margin-bottom: 20px;">
        <h1 class="font-weight-bold zalando-sans-semiexpanded" style="font-size: 2.5rem; letter-spacing: -1px; text-transform: uppercase;">Login to your dreams</h1>
    </div>
    
    <div class="box dream-bg" style="--bg-image: url('{% static 'images/BG4.png' %}'); width: 450px; padding: 40px; border-radius: 30px;">
        <div class="card p-4" style="background: rgba(255, 255, 255, 0.95); border-radius: 20px; border: none; box-shadow: none;">
            <form method="POST">
                {% csrf_token %}
                <input type="text" name="username" class="form-control dream-title-input mb-3" placeholder="Username" required>
                <input type="password" name="password" class="form-control dream-title-input mb-2" placeholder="Password" required>
                
                <div class="text-right mb-4">
                    <a href="#" class="small text-muted">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn btn-block dream-title-input" style="background-color: #333; color: white; height: auto; padding: 15px; font-weight: 500;">
                    Log In
                </button>
            </form>
            
            <p class="small text-center mt-4 mb-0">
                Don't have an account? <a href="{% url 'lunar_somnio:register' %}" class="font-weight-bold text-dark">Sign up.</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
