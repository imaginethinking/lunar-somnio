{% extends 'lunar_somnio/base.html' %}
{% load static %}

{% block title_block %}Sign Up{% endblock %}

{% block body_block %}
<div class="full-page">
    <div class="text-center mb-4">
        <h1 class="font-weight-bold zalando-sans-semiexpanded" style="font-size: 3rem; letter-spacing: -1px; text-transform: uppercase;">JOIN LUNAR SOMNIO</h1>
        <p class="text-muted" style="font-size: 1.1rem;">Create your account to start analyzing dreams.</p>
    </div>
    
    <div class="box dream-bg" style="--bg-image: url('{% static 'images/BG4.png' %}'); width: 450px; padding: 40px; border-radius: 30px;">
        <div class="card p-4" style="background: rgba(255, 255, 255, 0.95); border-radius: 20px; border: none; box-shadow: none;">
            <form method="POST">
                {% csrf_token %}
                <input type="text" name="username" class="form-control dream-title-input mb-3" placeholder="Username" required>
                <input type="email" name="email" class="form-control dream-title-input mb-3" placeholder="Email Address" required>
                <input type="password" name="password" class="form-control dream-title-input mb-3" placeholder="Password" required>
                <input type="number" name="age" class="form-control dream-title-input mb-4" placeholder="Your Age" required> 
                
                <button type="submit" class="btn btn-block dream-title-input" style="background-color: #333; color: white; height: auto; padding: 15px; font-weight: 500;">
                    Create Account
                </button>
            </form>
            <p class="small text-center mt-4 mb-0">
                Already have an account? <a href="{% url 'lunar_somnio:login' %}" class="font-weight-bold text-dark">Log in.</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
